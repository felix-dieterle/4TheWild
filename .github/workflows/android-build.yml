name: Android APK Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Set version code
        run: |
          sed -i "s/versionCode [0-9]\+/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/const APP_BUILD *= *[0-9]\+/const APP_BUILD   = ${{ github.run_number }}/" app.js

      - name: Copy web assets into Android project
        run: |
          mkdir -p android/app/src/main/assets/www
          cp index.html app.js style.css android/app/src/main/assets/www/
          cp -r lib android/app/src/main/assets/www/

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Set up consistent signing keystore
        run: |
          mkdir -p ~/.android
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
            echo "KEYSTORE_BOOTSTRAP=false" >> $GITHUB_ENV
          else
            echo "::warning::KEYSTORE_BASE64 secret is not set – generating a one-time bootstrap keystore."
            echo "::warning::After this build, save the artifact 'keystore-setup' as the KEYSTORE_BASE64"
            echo "::warning::repository secret so all future APKs share the same signing key."
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            base64 ~/.android/debug.keystore | tr -d '\n' > /tmp/KEYSTORE_BASE64.txt
            echo "KEYSTORE_BOOTSTRAP=true" >> $GITHUB_ENV
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Upload bootstrap keystore (first-time setup only)
        if: env.KEYSTORE_BOOTSTRAP == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: keystore-setup
          path: /tmp/KEYSTORE_BASE64.txt
          retention-days: 1

      - name: Build debug APK
        run: |
          cd android
          gradle assembleDebug

      - name: Rename APK
        run: |
          APP_VERSION=$(awk -F"'" '/const APP_VERSION =/ {print $2}' app.js)
          APK_NAME="4TheWild-v${APP_VERSION}-${{ github.run_number }}.apk"
          mv android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/${APK_NAME}"
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4TheWild-v${{ env.APP_VERSION }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/${{ env.APK_NAME }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-${{ github.run_number }}"
          gh release create "$TAG" \
            "android/app/build/outputs/apk/debug/${{ env.APK_NAME }}" \
            --title "Build ${{ github.run_number }}" \
            --generate-notes

